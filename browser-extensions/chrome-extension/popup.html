<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mazda OAuth Helper</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        width: 300px;
        padding: 16px;
        margin: 0;
      }

      h1 {
        font-size: 16px;
        color: #1a5276;
        margin: 0 0 12px 0;
      }

      p {
        font-size: 13px;
        color: #666;
        margin: 0 0 12px 0;
        line-height: 1.5;
      }

      .status {
        background: #e8f5e9;
        border-radius: 6px;
        padding: 10px 12px;
        font-size: 12px;
        color: #2e7d32;
      }

      .btn-clear {
        display: block;
        width: 100%;
        margin-top: 12px;
        padding: 8px 12px;
        background: #c0392b;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        box-sizing: border-box;
      }

      .btn-clear:hover {
        background: #a93226;
      }

      #clear-status {
        margin-top: 8px;
        font-size: 12px;
        min-height: 16px;
        color: #555;
      }
    </style>
  </head>
  <body>
    <h1>Mazda OAuth Helper</h1>
    <p>
      This extension captures authorization codes from Mazda's OAuth flow.
    </p>
    <p>
      Start the login process from Home Assistant. After you log in, the
      redirect URL will be re-written to the point to home assistant.
    </p>
    <div class="status">✓ Extension active and ready</div>
    <button class="btn-clear" id="clear-cookies">Clear Mazda Cookies</button>
    <div id="clear-status"></div>
    <script src="popup.js"></script>
  </body>
</html>
